<!DOCTYPE html>
<html>
<head>
  <title>Flipkart Clone</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h2>Flipkart Clone</h2>

</div>

<script src="script.js"></script>
</body>
</html>
